site_name: Redback - E-Waste Battery Extraction

theme:
  name: material
  language: en
  icon:
    logo: material/spider
  features:
    - navigation.tabs
  palette:
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: switch to dark mode
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: switch to light mode


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - awesome-pages
  #  - git-authors
